# Welcome to your prefect.yaml file! You can use this file for storing and managing
# configuration for deploying your flows. We recommend committing this file to source
# control along with your flow code.

# Generic metadata about this project
name: prefect-prosnet-v3
prefect-version: 3.2.11

# build section allows you to manage and build docker images
build:

# push section allows you to manage if and how this project is uploaded to remote locations
push:

# pull section allows you to provide instructions for cloning this project in remote locations
pull:
- prefect.deployments.steps.run_shell_script:
    id: install-git-lfs
    script: |
      apt-get update
      apt-get install -y git-lfs
      git lfs install
- prefect.deployments.steps.git_clone:
    id: clone-step
    repository: https://github.com/acdh-oeaw/prosnet-prefect-pipelines.git
    branch: prefect_v3
    access_token:
- prefect.deployments.steps.pip_install_requirements:
    id: install-deps-project
    directory: '{{ clone-step.directory }}'
    requirements_file: requirements.txt
    stream_output: false


# the deployments section allows you to provide configuration for deploying flows
deployments:
- name:
  version:
  tags: []
  description:
  schedule: {}
  flow_name:
  entrypoint:
  parameters: {}
  work_pool:
    name:
    work_queue_name:
    job_variables: {}
- name: default
  version:
  tags: []
  concurrency_limit:
  description: Main flow to fetch data from APIs and create a named graph NQuads file.
  entrypoint: pfp-prefect-pipelines/get_data_from_apis_instance.py:get_data_from_apis_instance
  parameters: {}
  work_pool:
    name: cluster2 workpool
    work_queue_name:
    job_variables: {}
  schedules: []
- name: pio_update
  version:
  tags: []
  concurrency_limit:
  description: Flow that fetches data from APIs and pushes it to a GitLab repository.
  entrypoint: 
    pfp-prefect-pipelines/get_apis_data_and_push_to_repo.py:get_apis_data_and_push_to_gitlab
  parameters:
    params:
      get_params:
        accept_header: text/ttl
        secret_token: oebl-pfp-api-token
        limit: 200
        api_url: https://oebl-pfp.acdh-ch-dev.oeaw.ac.at/apis/api/apis_ontology.
        swagger_url: https://oebl-pfp.acdh-ch-dev.oeaw.ac.at/apis/swagger/schema/
        swagger_tags:
        - rdfexport
        output_path: pio.ttl
      push_params:
        repo: acdh-ch/pfp/pfp-source-data
        username_secret: gitlab-source-data-user
        password_secret: gitlab-source-data-password
        git_provider: oeaw-gitlab
        branch_name: pio_branch
        file_path: pio.ttl
        file_path_git: datasets/pio.ttl
        commit_message: "feat: update PIO data to latest"
        branch_name_add_date: True
  work_pool:
    name: cluster2 workpool
    work_queue_name:
    job_variables: {}
  schedules: []
